# Simple configuration for Ethereum client branches to build

# Default upstream repository is assumed for each client
# Branch names are used directly as tags unless in alt_repos
#
# Tag override: use "<branch>:<tag>" to build from <branch> but publish as <tag>.
# Example: "prototype/focil:focil" builds the prototype/focil branch and tags it "focil".
# Without an override, slashes in branch names are replaced with hyphens for the tag.
#
# Each top-level key is a group (el, cl, mev, zk, tooling, other, lean).
# A group's `common_branches:` list is merged into every client in that group
# (set `skip_common: true` on a client to opt out).

# ============================================================
# Execution Layer (EL)
# ============================================================
el:
  common_branches:
    - bal-devnet-7
    - glamsterdam-devnet-5
    - glamsterdam-devnet-6
  clients:
    besu:
      branches:
        - main
        - performance
        - focil
    erigon:
      branches:
        - main
        - performance
    ethrex:
      branches:
        - main
        - bal-devnet-4
        - focil
    geth:
      branches:
        - master
        - performance
      alt_repos:
        MariusVanDerWijden/go-ethereum:
          - bad-block-generator
          - eip-7904
          - has-blobs
          - ssz-engine-api
        MarcoPolo/go-ethereum:
          - getBlobsV3
    nethermind:
      branches:
        - master
        - performance
        - eip-7904
    nimbus-eth1:
      branches:
        - master
    reth:
      branches:
        - main
      alt_repos:
        PelleKrab/reth:
          - focil_impl

# ============================================================
# Consensus Layer (CL)
# ============================================================
cl:
  common_branches:
    - glamsterdam-devnet-5
    - glamsterdam-devnet-6
  clients:
    caplin:
      skip_common: true
      branches:
        - main
    consensoor:
      skip_common: true
      branches:
        - main
    grandine:
      branches:
        - develop
        - master
    lighthouse:
      branches:
        - stable
        - unstable
        - epbs-devnet-1
        - focil
      alt_repos:
        eth-act/lighthouse:
          - optional-proofs
        dknopik/lighthouse:
          - partial-columns
    lodestar:
      branches:
        - stable
        - unstable
        - focil
        - epbs-devnet-1
        - optional-proofs
    nimbus:
      branches:
        - unstable
        - stable
        - optional-proofs
    prysm:
      branches:
        - develop
        - master
        - rebased-partial-columns
        - prysm/partial-cells-current
        - optional-proofs
      alt_repos:
        MarcoPolo/prysm:
          - partial-columns
        developeruche/prysm:
          - poc/optional-proofs
        bharath-123/prysm:
          - buildoor-apis
    teku:
      branches:
        - master
        - optional-proofs
        - prototype/focil:focil

