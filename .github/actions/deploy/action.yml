name: Deploy
description: Build and push a docker image to Docker Hub

inputs:
  source_repository:
    description: The source repository to build from
    type: string
    required: true
  source_ref:
    description: The branch, tag or SHA to checkout and build from
    type: string
    required: true
  source_commit:
    description: The specific commit SHA to checkout (takes precedence over source_ref)
    type: string
    required: false
  source_patch:
    description: The patch to apply to the source repository
    type: string
    required: false
  build_script:
    description: The bash script path in this repository to run instead of the Docker build & push script. You must push the image yourself.
    type: string
    required: false
  build_args:
    description: Build arguments to pass to the Docker build
    default: ""
    type: string
    required: false
  target_tag:
    description: Docker hub tag to push to
    type: string
    required: true
  target_repository:
    description: Docker hub repository to push to
    type: string
    required: true
  target_dockerfile:
    description: Dockerfile path in this repository to build from. Omit to use source repository Dockerfile
    type: string
    default: ./source/Dockerfile
    required: false
  platform:
    description: The platform to build for
    type: string
    required: true
  build_method:
    description: Build method to use (go or bazel)
    type: string
    default: bazel
    required: false
  harbor_registry:
    description: Harbor registry to push the images to
    type: string
    default: ''
  # Secrets
  DOCKER_USERNAME:
    required: true
  DOCKER_PASSWORD:
    required: true
  MACOS_PASSWORD:
    required: true
  GOPROXY:
    required: false
  HARBOR_USERNAME:
    required: true
  HARBOR_PASSWORD:
    required: true

outputs:
  git_commit_hash:
    description: The git commit hash of the source repository
    value: ${{ steps.git_commit_hash.outputs.git_commit_hash }}
  git_commit_hash_full:
    description: The full git commit hash of the source repository
    value: ${{ steps.git_commit_hash_full.outputs.git_commit_hash_full }}
  resolved_dockerfile:
    description: Dockerfile path actually used (after per-tag convention resolution)
    value: ${{ steps.resolve_dockerfile.outputs.dockerfile }}

runs:
  using: composite
  steps:
  - name: Checkout this repo
    uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
  - name: Resolve target dockerfile (prefer ./<client>/Dockerfile.<tag>)
    id: resolve_dockerfile
    shell: bash
    env:
      TARGET_DOCKERFILE: ${{ inputs.target_dockerfile }}
      TARGET_TAG: ${{ inputs.target_tag }}
    run: |
      resolved="$TARGET_DOCKERFILE"
      if [ -n "$TARGET_DOCKERFILE" ] && [ "$(basename "$TARGET_DOCKERFILE")" = "Dockerfile" ]; then
        base_tag="${TARGET_TAG%-*-*}"
        candidate="$(dirname "$TARGET_DOCKERFILE")/Dockerfile.${base_tag}"
        if [ -f "$candidate" ]; then
          echo "Using per-tag Dockerfile: $candidate (base tag: $base_tag)"
          resolved="$candidate"
        fi
      fi
      echo "dockerfile=$resolved" >> "$GITHUB_OUTPUT"
  - name: Check out source repository
    uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    with:
      repository: ${{ inputs.source_repository }}
      path: source
      ref: ${{ inputs.source_commit || inputs.source_ref }}
      fetch-depth: 0
  - name: get short git commit hash
    id: git_commit_hash
    shell: bash
    run: |
      cd source
      echo "git_commit_hash=$(echo $(git log --pretty=format:'%h' -n 1 --abbrev=7))" >> $GITHUB_OUTPUT
  - name: get full git commit hash
    id: git_commit_hash_full
    shell: bash
    run: |
      cd source
      echo "git_commit_hash_full=$(echo $(git log --pretty=format:'%H' -n 1))" >> $GITHUB_OUTPUT
  - name: Apply patch to source repository
    shell: bash
    if: inputs.source_patch
    run: |
      cd source
      patch -p 1 < ../${{ inputs.source_patch }}
  - name: Set up Docker Context for Buildx
    shell: bash
    id: buildx-context
    run: |
      docker context use builders || docker context create builders
  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
    with:
      endpoint: builders
  - name: Unlock MacOS keychain for Docker Hub login
    shell: bash
    if: runner.os == 'macOS'
    run: |
      security -v unlock-keychain -p ${{ inputs.MACOS_PASSWORD }} ~/Library/Keychains/login.keychain-db
  - name: Login to Docker Hub
    uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
    with:
      username: ${{ inputs.DOCKER_USERNAME }}
      password: ${{ inputs.DOCKER_PASSWORD }}
  - name: Login to harbor registry
    if: ${{ inputs.harbor_registry != '' }}
    id: harbor_login
    continue-on-error: true
    uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
    with:
      registry: ${{ inputs.harbor_registry }}
      username: ${{ inputs.HARBOR_USERNAME }}
      password: ${{ inputs.HARBOR_PASSWORD }}
  ########################
  # Build script case
  #######################
  - name: Build script
    shell: bash
    if: inputs.build_script
    env:
      source_repository: ${{ inputs.source_repository }}
      source_ref: ${{ inputs.source_ref }}
      target_tag: ${{ inputs.target_tag }}
      target_repository: ${{ inputs.target_repository }}
      target_dockerfile: ${{ steps.resolve_dockerfile.outputs.dockerfile || './source/Dockerfile' }}
      source_git_commit_hash: ${{ steps.git_commit_hash.outputs.git_commit_hash }}
      source_git_commit_hash_full: ${{ steps.git_commit_hash_full.outputs.git_commit_hash_full }}
      GOPROXY: ${{ inputs.GOPROXY }}
      build_method: ${{ inputs.build_method }}
    run: |
      ${{ inputs.build_script }}
  - name: Image digest & tags (build script)
    shell: bash
    if: inputs.build_script
    run: |
      cat << EOF
      digest: $(docker image inspect  --format='{{index .RepoDigests 0}}' ${{ inputs.target_repository }}:${{ inputs.target_tag }} | grep -oE "@(.*)" | cut -d'@' -f2-)
      tags:
        ${{ inputs.target_repository }}:${{ inputs.target_tag }}
        ${{ inputs.target_repository }}:${{ inputs.target_tag }}-${{ steps.git_commit_hash.outputs.git_commit_hash }}
      EOF
  ########################
  # Non build script case
  #######################
  - name: Inject GOPROXY into Dockerfile
    if: ${{ inputs.build_script == '' }}
    shell: bash
    run: |
      DOCKERFILE_PATH="${{ steps.resolve_dockerfile.outputs.dockerfile }}"
      if [[ -z "$DOCKERFILE_PATH" ]]; then
        # Set to default value explicitly if input is empty
        DOCKERFILE_PATH='./source/Dockerfile'
      fi
      awk '/^FROM/ { print; print "ENV GOPROXY=${{ inputs.GOPROXY }}"; next }1' ${DOCKERFILE_PATH} > Dockerfile.new
      mv Dockerfile.new ${DOCKERFILE_PATH}
  - name: Docker build & push
    if: ${{ inputs.build_script == '' }}
    id: docker_build
    uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
    with:
      context: ./source
      file: ${{ steps.resolve_dockerfile.outputs.dockerfile }}
      tags: |
        ${{ inputs.target_repository }}:${{ inputs.target_tag }}-${{ steps.git_commit_hash.outputs.git_commit_hash }}
        ${{ inputs.target_repository }}:${{ inputs.target_tag }}
      push: true
      platforms: ${{ inputs.platform }}
      build-args: |
        ${{ inputs.build_args }}
        COMMIT_HASH=${{ steps.git_commit_hash_full.outputs.git_commit_hash_full }}
      labels: |
        ethpandaops.io.repo=${{ inputs.source_repository }}
        ethpandaops.io.commitRef=${{ inputs.source_ref }}
        commit=${{ steps.git_commit_hash.outputs.git_commit_hash }}
        version=${{ inputs.source_ref }}
        buildnum=${{ github.run_number }}
  - name: Push to harbor registry (best-effort)
    if: ${{ inputs.build_script == '' && inputs.harbor_registry != '' && steps.harbor_login.outcome == 'success' }}
    continue-on-error: true
    shell: bash
    run: |
      echo "Pushing to harbor registry (best-effort)..."
      docker buildx imagetools create \
        --tag ${{ inputs.harbor_registry }}/${{ inputs.target_repository }}:${{ inputs.target_tag }}-${{ steps.git_commit_hash.outputs.git_commit_hash }} \
        --tag ${{ inputs.harbor_registry }}/${{ inputs.target_repository }}:${{ inputs.target_tag }} \
        ${{ inputs.target_repository }}:${{ inputs.target_tag }}-${{ steps.git_commit_hash.outputs.git_commit_hash }} || echo "Harbor push failed, continuing..."
  - name: Image digest & tags
    shell: bash
    if: ${{ inputs.build_script == '' }}
    run: |
      cat << EOF
      digest: ${{ steps.docker_build.outputs.digest }}
      tags:
        ${{ inputs.target_repository }}:${{ inputs.target_tag }}
        ${{ inputs.target_repository }}:${{ inputs.target_tag }}-${{ steps.git_commit_hash.outputs.git_commit_hash }}
      EOF
